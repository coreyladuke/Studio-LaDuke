<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Workshop | Studio LaDuke</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #e7dfcf;
      color: #1d1d1b;
      font-family: Georgia, serif;
      display: grid;
      place-items: center;
      text-align: center;
    }

    main {
      max-width: 680px;
      padding: 40px 24px;
    }

    h1 {
      font-size: clamp(2.6rem, 12vw, 5rem);
      margin: 0 0 24px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.7;
    }

    .note {
      margin: 36px auto;
      padding: 24px;
      max-width: 420px;
      background: #fff8a8;
      transform: rotate(-2deg);
      box-shadow: 5px 7px 0 rgba(0,0,0,.15);
    }

    a {
      color: inherit;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <main>
    <h1>The Workshop</h1>

    <p>You’re early.</p>

    <div class="note">
      Bob, Pinky, books, shoes, wallets, stickers, art,
      rescued furniture and several ideas that should
      probably be supervised are moving in.
    </div>

    <p>Everything is under construction.</p>
    <p>Fortunately, so is the owner.</p>

    <p><a href="index.html">Go back outside</a></p>
  </main>
</body>
</html>

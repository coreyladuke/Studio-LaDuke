<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>The Workshop | Studio LaDuke</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #080706;
      color: #eee8dd;
      font-family: Georgia, serif;
    }

    body {
      overflow-x: hidden;
    }

    button,
    a {
      font: inherit;
    }

    .workshop {
      position: relative;
      width: 100%;
      min-height: 100svh;
      overflow: hidden;

      background:
        radial-gradient(
          circle at 50% 18%,
          rgba(175, 114, 61, 0.22),
          transparent 27%
        ),
        linear-gradient(
          #241a16 0%,
          #17110f 62%,
          #090706 100%
        );
    }

    .workshop::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 40;
      pointer-events: none;

      background:
        radial-gradient(
          circle at 50% 48%,
          transparent 0 37%,
          rgba(0, 0, 0, 0.42) 70%,
          rgba(0, 0, 0, 0.82) 100%
        );
    }

    .header {
      position: absolute;
      top: 20px;
      left: 50%;
      z-index: 60;
      width: min(92%, 700px);
      transform: translateX(-50%);
      text-align: center;
      text-shadow: 0 3px 14px black;
      pointer-events: none;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 4rem);
      letter-spacing: 0.04em;
    }

    .header p {
      margin: 8px 0 0;
      color: #b9aea3;
      font-size: 0.9rem;
    }

    .back {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 80;
      padding: 9px 11px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.45);
      color: rgba(255, 255, 255, 0.68);
      text-decoration: none;
      font-size: 0.76rem;
    }

    .normal-link {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 80;
      padding: 9px 11px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.45);
      color: rgba(255, 255, 255, 0.68);
      text-decoration: none;
      font-size: 0.76rem;
    }

    .ceiling-wire {
      position: absolute;
      top: 0;
      left: 50%;
      width: 3px;
      height: 125px;
      transform: translateX(-50%);
      background: #111;
      z-index: 8;
    }

    .lamp {
      position: absolute;
      top: 105px;
      left: 50%;
      z-index: 15;
      width: 78px;
      height: 70px;
      transform: translateX(-50%);
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .shade {
      position: absolute;
      left: 50%;
      top: 0;
      width: 72px;
      height: 42px;
      transform: translateX(-50%);
      border-radius: 50% 50% 12% 12%;
      background: linear-gradient(#272522, #111);
    }

    .lamp-glow {
      position: absolute;
      top: 31px;
      left: 50%;
      width: 24px;
      height: 30px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: #4a4436;
      transition: 0.25s;
    }

    .workshop.light-on .lamp-glow {
      background: #ffe6a0;

      box-shadow:
        0 0 22px #ffd473,
        0 0 80px rgba(255, 212, 115, 0.8),
        0 0 180px rgba(255, 212, 115, 0.35);
    }

    .wall-board {
      position: absolute;
      left: 6%;
      top: 26%;
      z-index: 8;
      width: min(28vw, 260px);
      height: min(31vh, 250px);
      border: 8px solid #342116;
      background:
        repeating-linear-gradient(
          90deg,
          #5a3926 0 42px,
          #492c1d 43px 46px
        );
      box-shadow:
        inset 0 0 28px rgba(0, 0, 0, 0.5),
        0 16px 30px rgba(0, 0, 0, 0.45);
    }

    .paddle {
      position: absolute;
      left: 50%;
      top: 8%;
      width: 28px;
      height: 86%;
      transform: translateX(-50%) rotate(-8deg);
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .paddle::before {
      content: "";
      position: absolute;
      top: 0;
      left: 10px;
      width: 8px;
      height: 68%;
      border-radius: 5px;
      background: #c39761;
    }

    .paddle::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 28px;
      height: 42%;
      border-radius: 50% 50% 18% 18%;
      background:
        linear-gradient(
          90deg,
          #b98147,
          #d3aa70,
          #9f6534
        );
    }

    .shelf {
      position: absolute;
      right: 5%;
      top: 27%;
      z-index: 9;
      width: min(31vw, 290px);
      height: 210px;
      border-left: 10px solid #2d1c13;
      border-right: 10px solid #2d1c13;
      border-bottom: 12px solid #2d1c13;
    }

    .shelf::before,
    .shelf::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      height: 10px;
      background: #493020;
    }

    .shelf::before {
      top: 65px;
    }

    .shelf::after {
      top: 135px;
    }

    .book-link {
      position: absolute;
      left: 12px;
      top: 10px;
      width: 72px;
      height: 53px;
      padding: 7px;
      border-radius: 2px 7px 7px 2px;
      background: linear-gradient(90deg, #2c1512 0 12%, #71372c 13%);
      color: #e2c88f;
      text-decoration: none;
      text-align: center;
      font-size: 0.54rem;
      line-height: 1.25;
      transform: rotate(-3deg);
      box-shadow: 5px 7px 11px rgba(0, 0, 0, 0.45);
    }

    .shoe {
      position: absolute;
      right: 12px;
      top: 82px;
      width: 105px;
      height: 43px;
      border: 0;
      border-radius: 70% 25% 34% 30%;
      transform: rotate(-5deg);
      background:
        linear-gradient(
          #535353 0 60%,
          #232323 61% 78%,
          #b9a58e 79%
        );
      cursor: pointer;
      box-shadow: 5px 7px 12px rgba(0, 0, 0, 0.48);
    }

    .shoe::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 6px;
      width: 45px;
      height: 12px;
      border-radius: 8px;
      border-top: 3px dashed #c17d49;
    }

    .wallet {
      position: absolute;
      left: 20px;
      bottom: 8px;
      width: 76px;
      height: 45px;
      border: 0;
      border-radius: 5px;
      background:
        linear-gradient(
          115deg,
          #222,
          #4e4e4e 55%,
          #242424
        );
      cursor: pointer;
      box-shadow: 5px 7px 12px rgba(0, 0, 0, 0.48);
    }

    .wallet::after {
      content: "SCRAPZ";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #b98453;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
    }

    .guitar {
      position: absolute;
      right: 10%;
      bottom: 16%;
      z-index: 20;
      width: 115px;
      height: 270px;
      border: 0;
      background: transparent;
      cursor: pointer;
      transform: rotate(6deg);
    }

    .guitar::before {
      content: "";
      position: absolute;
      left: 53px;
      top: 0;
      width: 11px;
      height: 170px;
      border-radius: 5px;
      background: linear-gradient(90deg, #28160f, #7b4e2f, #291710);
    }

    .guitar::after {
      content: "";
      position: absolute;
      left: 22px;
      bottom: 0;
      width: 80px;
      height: 112px;
      border-radius: 45% 48% 42% 46%;
      background:
        radial-gradient(circle at 50% 45%, #0c0c0c 0 12%, transparent 13%),
        linear-gradient(120deg, #522318, #b45d2d 50%, #4a1d14);
      box-shadow:
        inset 0 0 16px #1c0905,
        8px 12px 20px rgba(0, 0, 0, 0.55);
    }

    .workbench {
      position: absolute;
      left: 50%;
      bottom: 17%;
      z-index: 15;
      width: min(68vw, 620px);
      height: 31px;
      transform: translateX(-50%);
      border-radius: 5px;
      background:
        repeating-linear-gradient(
          90deg,
          #71492e 0 70px,
          #50301f 71px 75px
        );
      box-shadow:
        0 15px 28px rgba(0, 0, 0, 0.65),
        inset 0 4px rgba(255, 255, 255, 0.09);
    }

    .workbench::before,
    .workbench::after {
      content: "";
      position: absolute;
      top: 27px;
      width: 25px;
      height: 175px;
      background: linear-gradient(90deg, #26160f, #583521, #24140d);
    }

    .workbench::before {
      left: 8%;
    }

    .workbench::after {
      right: 8%;
    }

    .bob {
      position: absolute;
      left: 50%;
      bottom: calc(17% + 28px);
      z-index: 26;
      width: 118px;
      height: 175px;
      transform: translateX(-50%);
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .plant {
      position: absolute;
      left: 50%;
      bottom: 62px;
      width: 108px;
      height: 112px;
      transform: translateX(-50%);
    }

    .leaf {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 23px;
      height: 104px;
      border-radius: 70% 15% 70% 18%;
      transform-origin: bottom center;
      background: linear-gradient(90deg, #172817, #426a32, #1a341a);
    }

    .leaf:nth-child(1) {
      transform: translateX(-50%) rotate(-38deg) scale(0.8);
    }

    .leaf:nth-child(2) {
      transform: translateX(-50%) rotate(-19deg) scale(0.92);
    }

    .leaf:nth-child(3) {
      transform: translateX(-50%);
    }

    .leaf:nth-child(4) {
      transform: translateX(-50%) rotate(19deg) scale(0.92);
    }

    .leaf:nth-child(5) {
      transform: translateX(-50%) rotate(38deg) scale(0.8);
    }

    .pot {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 90px;
      height: 69px;
      transform: translateX(-50%);
      border-radius: 7px 7px 26px 26px;
      background: linear-gradient(110deg, #34302b 0 44%, #181715 45% 49%, #4a443d 50%);
      box-shadow: inset 0 7px #191816, 0 9px 14px rgba(0, 0, 0, 0.55);
    }

    .pot::after {
      content: "";
      position: absolute;
      top: 14px;
      left: 29px;
      width: 5px;
      height: 45px;
      border-radius: 4px;
      background: #d3a54a;
      transform: rotate(-12deg);
      box-shadow:
        11px 17px 0 -1px #d3a54a,
        22px 2px 0 -1px #d3a54a;
    }

    .eyes {
      position: absolute;
      left: 50%;
      bottom: 31px;
      width: 51px;
      height: 12px;
      transform: translateX(-50%);
      z-index: 3;
    }

    .eye {
      position: absolute;
      top: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #070707;
      transition: 0.2s;
    }

    .eye:first-child {
      left: 7px;
    }

    .eye:last-child {
      right: 7px;
    }

    .bob.look-right .eye {
      transform: translateX(5px);
    }

    .trapdoor {
      position: absolute;
      left: 56%;
      bottom: 7%;
      z-index: 16;
      width: 130px;
      height: 60px;
      transform: translateX(-50%) rotate(-4deg);
      border: 6px solid #21140e;
      background:
        repeating-linear-gradient(
          90deg,
          #3b2518 0 31px,
          #25170f 32px 35px
        );
      cursor: pointer;
      box-shadow: inset 0 0 16px black;
    }

    .trapdoor::after {
      content: "";
      position: absolute;
      right: 12px;
      top: 50%;
      width: 13px;
      height: 13px;
      transform: translateY(-50%);
      border-radius: 50%;
      background: #b88a42;
      box-shadow: 0 0 8px rgba(184, 138, 66, 0.7);
    }

    .brain-door {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 90;
      width: min(88vw, 440px);
      padding: 27px 22px;
      transform: translate(-50%, -50%) scale(0.92);
      border: 2px solid #a46476;
      background:
        radial-gradient(
          circle at 20% 20%,
          rgba(125, 48, 72, 0.4),
          transparent 30%
        ),
        rgba(8, 6, 7, 0.96);
      text-align: center;
      box-shadow:
        0 0 35px rgba(164, 100, 118, 0.3),
        0 28px 70px rgba(0, 0, 0, 0.8);
      opacity: 0;
      pointer-events: none;
      transition: 0.22s;
    }

    .brain-door.open {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    .brain-door h2 {
      margin-top: 0;
      font-size: clamp(1.6rem, 6vw, 2.4rem);
    }

    .brain-door p {
      color: #c7b9bd;
      line-height: 1.5;
    }

    .brain-door a {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 22px;
      border: 2px solid #eee8dd;
      color: #eee8dd;
      text-decoration: none;
    }

    .message {
      position: absolute;
      left: 50%;
      bottom: 2%;
      z-index: 70;
      width: min(91vw, 700px);
      min-height: 58px;
      transform: translateX(-50%);
      display: grid;
      place-items: center;
      padding: 13px 17px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(0, 0, 0, 0.77);
      color: #e8dfd2;
      text-align: center;
      line-height: 1.35;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.45);
    }

    @media (max-width: 640px) {
      .header {
        top: 62px;
      }

      .wall-board {
        left: 2%;
        top: 30%;
        width: 29vw;
        height: 23vh;
        border-width: 6px;
      }

      .shelf {
        right: 2%;
        top: 31%;
        width: 34vw;
        height: 190px;
      }

      .guitar {
        right: 1%;
        bottom: 16%;
        transform: scale(0.75) rotate(6deg);
        transform-origin: bottom right;
      }

      .workbench {
        width: 72vw;
      }

      .trapdoor {
        left: 60%;
        bottom: 8%;
        transform: translateX(-50%) scale(0.8) rotate(-4deg);
      }

      .message {
        font-size: 0.84rem;
      }
    }
  </style>
</head>

<body>

  <main class="workshop" id="workshop">

    <a class="back" href="index.html">
      Go back outside
    </a>

    <a class="normal-link" href="directory.html">
      Normal navigation
    </a>

    <header class="header">
      <h1>The Workshop</h1>
      <p>
        Everything is under construction. Fortunately, so is the owner.
      </p>
    </header>

    <div class="ceiling-wire"></div>

    <button
      class="lamp"
      id="lampButton"
      type="button"
      aria-label="Turn on the workshop light"
    >
      <span class="shade"></span>
      <span class="lamp-glow"></span>
    </button>

    <section class="wall-board" aria-label="Paddle display">
      <button
        class="paddle"
        id="paddleButton"
        type="button"
        aria-label="Inspect the paddle"
      ></button>
    </section>

    <section class="shelf" aria-label="Studio shelf">

      <a
        class="book-link"
        href="#"
        id="bookLink"
      >
        EVERYBODY<br>
        DESERVES<br>
        TO GO HOME
      </a>

      <button
        class="shoe"
        id="shoeButton"
        type="button"
        aria-label="Inspect the shoe prototype"
      ></button>

      <button
        class="wallet"
        id="walletButton"
        type="button"
        aria-label="Inspect the Scrapz wallet"
      ></button>

    </section>

    <button
      class="guitar"
      id="guitarButton"
      type="button"
      aria-label="Play the guitar"
    ></button>

    <div class="workbench"></div>

    <button
      class="bob"
      id="bobButton"
      type="button"
      aria-label="Talk to Bob"
    >
      <span class="plant">
        <span class="leaf"></span>
        <span class="leaf"></span>
        <span class="leaf"></span>
        <span class="leaf"></span>
        <span class="leaf"></span>
      </span>

      <span class="pot"></span>

      <span class="eyes">
        <span class="eye"></span>
        <span class="eye"></span>
      </span>
    </button>

    <button
      class="trapdoor"
      id="trapdoorButton"
      type="button"
      aria-label="Open the suspicious floor panel"
    ></button>

    <section
      class="brain-door"
      id="brainDoor"
      aria-hidden="true"
    >
      <h2>This was not on the floor plan.</h2>

      <p>
        The stairs go down, but somehow also inward.
      </p>

      <a href="brain.html">
        Enter the room inside my head
      </a>
    </section>

    <div
      class="message"
      id="message"
      aria-live="polite"
    >
      The workshop is quiet. Touch something.
    </div>

  </main>

  <script>
    const workshop = document.getElementById("workshop");
    const message = document.getElementById("message");
    const lampButton = document.getElementById("lampButton");
    const paddleButton = document.getElementById("paddleButton");
    const shoeButton = document.getElementById("shoeButton");
    const walletButton = document.getElementById("walletButton");
    const guitarButton = document.getElementById("guitarButton");
    const bobButton = document.getElementById("bobButton");
    const trapdoorButton = document.getElementById("trapdoorButton");
    const brainDoor = document.getElementById("brainDoor");
    const bookLink = document.getElementById("bookLink");

    let lightOn = false;
    let bobConsulted = false;

    function say(words) {
      message.textContent = words;
    }

    lampButton.addEventListener("click", function () {
      lightOn = !lightOn;

      workshop.classList.toggle("light-on", lightOn);

      if (lightOn) {
        say("The workshop light hums awake.");
      } else {
        say("You turned the light off in a room full of tools. Excellent judgment.");
      }
    });

    paddleButton.addEventListener("click", function () {
      say(
        "A paddle waits on the wall. It knows it will become something, but refuses to speculate."
      );
    });

    shoeButton.addEventListener("click", function () {
      say(
        "Prototype Zero. Part shoe, part experiment, entirely unwilling to be ordinary."
      );
    });

    walletButton.addEventListener("click", function () {
      say(
        "SCRAPZ: rescued vinyl refusing to admit it was ever garbage."
      );
    });

    guitarButton.addEventListener("click", function () {
      say(
        "The guitar produces a chord that exists mostly in your imagination."
      );
    });

    bookLink.addEventListener("click", function (event) {
      event.preventDefault();

      say(
        "The book is still being prepared. It has already been through enough."
      );
    });

    bobButton.addEventListener("click", function () {
      bobConsulted = true;
      bobButton.classList.add("look-right");

      say(
        'Bob: “There is a suspicious panel in the floor. I assumed you knew.”'
      );
    });

    trapdoorButton.addEventListener("click", function () {
      if (!lightOn) {
        say(
          "You find the edge of a floor panel, but it is too dark to see the latch."
        );

        return;
      }

      if (!bobConsulted) {
        say(
          "The panel is locked. Someone nearby looks professionally uninvolved."
        );

        return;
      }

      brainDoor.classList.add("open");
      brainDoor.setAttribute("aria-hidden", "false");

      say(
        "The floor opens. The stairs appear to lead beneath your own thoughts."
      );
    });
  </script>

</body>
</html>

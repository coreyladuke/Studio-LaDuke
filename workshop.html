<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Studio LaDuke House</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cedar-light: #b97845;
      --cedar-medium: #8d542e;
      --cedar-dark: #56301c;

      --cream: #e7dfce;
      --black: #171513;

      --door-light: #86502f;
      --door-dark: #442718;

      --warm-light: rgba(255, 221, 157, 0.35);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #17120f;
      color: #f4eee4;
      font-family: Georgia, "Times New Roman", serif;
      touch-action: pan-y;
    }

    button,
    a {
      font: inherit;
    }

    .house {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 100svh;
      overflow: hidden;

      background:
        linear-gradient(
          to bottom,
          #6f4025 0%,
          #9d6138 16%,
          #9d6138 64%,
          #39271f 64%,
          #1a1715 100%
        );

      perspective: 1100px;
      isolation: isolate;
    }

    /* Soft daylight inside the room */

    .room-light {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;

      background:
        radial-gradient(
          circle at 50% 15%,
          rgba(255, 247, 211, 0.42),
          transparent 42%
        ),
        linear-gradient(
          105deg,
          rgba(255, 239, 190, 0.22),
          transparent 40%
        );
    }

    /* Cedar plank wall texture */

    .cedar-wall {
      position: absolute;
      inset: 0 0 31% 0;
      z-index: 1;

      background:
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.045) 0,
          rgba(255, 255, 255, 0.045) 2px,
          transparent 2px,
          transparent 54px
        ),
        repeating-linear-gradient(
          0deg,
          transparent 0,
          transparent 19px,
          rgba(75, 35, 17, 0.12) 20px
        ),
        linear-gradient(
          90deg,
          var(--cedar-medium),
          var(--cedar-light) 48%,
          var(--cedar-medium)
        );

      box-shadow:
        inset 0 -26px 40px rgba(44, 21, 11, 0.3),
        inset 0 10px 30px rgba(255, 232, 191, 0.12);
    }

    /* Checkerboard floor */

    .floor {
      position: absolute;
      left: -18%;
      bottom: -29%;
      z-index: 2;

      width: 136%;
      height: 74%;

      transform-origin: center top;
      transform: perspective(750px) rotateX(61deg);

      background-color: var(--cream);
      background-image:
        linear-gradient(
          45deg,
          var(--black) 25%,
          transparent 25%,
          transparent 75%,
          var(--black) 75%
        ),
        linear-gradient(
          45deg,
          var(--black) 25%,
          transparent 25%,
          transparent 75%,
          var(--black) 75%
        );

      background-position:
        0 0,
        48px 48px;

      background-size: 96px 96px;

      box-shadow:
        inset 0 30px 45px rgba(0, 0, 0, 0.4),
        0 -8px 22px rgba(0, 0, 0, 0.25);
    }

    /* Ceiling beam */

    .top-beam {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 7;

      width: 100%;
      height: 7%;

      background:
        linear-gradient(
          to bottom,
          #472617,
          #704125 55%,
          #3c2115
        );

      border-bottom: 3px solid rgba(48, 25, 14, 0.75);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.28);
    }

    /* Decorative cedar columns */

    .column {
      position: absolute;
      top: 4%;
      bottom: 25%;
      z-index: 8;

      width: clamp(25px, 4vw, 54px);

      background:
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 9px,
          rgba(255, 224, 184, 0.09) 10px,
          transparent 14px
        ),
        linear-gradient(
          90deg,
          #472719,
          #9c6038 43%,
          #64391f
        );

      border: 2px solid rgba(52, 27, 15, 0.75);

      box-shadow:
        8px 0 15px rgba(0, 0, 0, 0.18),
        inset 5px 0 8px rgba(255, 223, 183, 0.08);
    }

    .column-left {
      left: 3%;
    }

    .column-right {
      right: 3%;
    }

    /* Panoramic room views */

    .view-stage {
      position: absolute;
      inset: 7% 0 26% 0;
      z-index: 5;

      overflow: hidden;
      transform-style: preserve-3d;
    }

    .room-view {
      position: absolute;
      inset: 0;

      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      align-items: end;

      gap: clamp(8px, 2.4vw, 32px);
      padding:
        clamp(48px, 9vh, 90px)
        clamp(48px, 9vw, 130px)
        clamp(14px, 2vh, 26px);

      transition:
        transform 700ms cubic-bezier(0.22, 0.75, 0.22, 1),
        opacity 520ms ease,
        filter 520ms ease;

      transform-origin: center;
      backface-visibility: hidden;
    }

    .room-view.active {
      opacity: 1;
      transform: translateX(0) rotateY(0deg) scale(1);
      filter: blur(0);
      pointer-events: auto;
    }

    .room-view.waiting-right {
      opacity: 0;
      transform: translateX(55%) rotateY(-34deg) scale(0.82);
      filter: blur(3px);
      pointer-events: none;
    }

    .room-view.waiting-left {
      opacity: 0;
      transform: translateX(-55%) rotateY(34deg) scale(0.82);
      filter: blur(3px);
      pointer-events: none;
    }

    /* Windows */

    .window {
      position: absolute;
      top: 8%;
      z-index: 4;

      width: clamp(80px, 12vw, 150px);
      aspect-ratio: 0.78;

      overflow: hidden;

      background:
        linear-gradient(
          to bottom,
          #86bdd0 0%,
          #c5dfd8 42%,
          #6f955f 43%,
          #365437 100%
        );

      border: clamp(6px, 1vw, 11px) solid #61391f;

      box-shadow:
        0 0 0 3px rgba(44, 23, 14, 0.7),
        0 5px 14px rgba(0, 0, 0, 0.3),
        0 0 28px rgba(255, 235, 176, 0.2);
    }

    .window::before,
    .window::after {
      content: "";
      position: absolute;
      z-index: 2;
      background: #643b22;
    }

    .window::before {
      top: 0;
      left: 47%;
      width: 7%;
      height: 100%;
    }

    .window::after {
      top: 47%;
      left: 0;
      width: 100%;
      height: 7%;
    }

    .window-left {
      left: 7%;
    }

    .window-right {
      right: 7%;
    }

    .trees {
      position: absolute;
      inset: 35% -15% -8% -15%;

      background:
        repeating-linear-gradient(
          74deg,
          transparent 0,
          transparent 12px,
          rgba(25, 65, 36, 0.75) 13px,
          rgba(25, 65, 36, 0.75) 25px,
          transparent 26px,
          transparent 38px
        );

      transform-origin: bottom center;
      animation: treesMove 6s ease-in-out infinite alternate;
    }

    @keyframes treesMove {
      from {
        transform: skewX(-2deg) translateX(-2px);
      }

      to {
        transform: skewX(2deg) translateX(3px);
      }
    }

    /* Doors */

    .door {
      position: relative;
      align-self: end;

      width: 100%;
      max-width: 170px;
      height: clamp(190px, 34vh, 320px);

      justify-self: center;

      color: #f4eee4;
      text-decoration: none;

      background:
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.035) 0,
          rgba(255, 255, 255, 0.035) 2px,
          transparent 2px,
          transparent 29px
        ),
        linear-gradient(
          90deg,
          var(--door-dark),
          var(--door-light) 48%,
          var(--door-dark)
        );

      border:
        clamp(5px, 0.8vw, 9px)
        solid
        #3b2115;

      border-radius: 5px 5px 1px 1px;

      box-shadow:
        0 9px 12px rgba(0, 0, 0, 0.35),
        inset 0 0 0 3px rgba(191, 127, 78, 0.24),
        inset 13px 0 20px rgba(0, 0, 0, 0.15);

      transition:
        transform 220ms ease,
        filter 220ms ease,
        box-shadow 220ms ease;
    }

    .door::before {
      content: "";
      position: absolute;
      inset: 10% 13% 49%;

      border: 2px solid rgba(220, 169, 123, 0.25);
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.12);
    }

    .door::after {
      content: "";
      position: absolute;
      right: 10%;
      top: 52%;

      width: 10px;
      height: 10px;

      border-radius: 50%;

      background: #bf9857;

      box-shadow:
        0 0 0 2px #4c301e,
        0 2px 3px rgba(0, 0, 0, 0.35);
    }

    .door:hover,
    .door:focus-visible {
      transform: translateY(-5px) scale(1.015);
      filter: brightness(1.08);

      box-shadow:
        0 15px 18px rgba(0, 0, 0, 0.38),
        inset 0 0 0 3px rgba(220, 169, 123, 0.3);
    }

    .door-sign {
      position: absolute;
      left: 50%;
      bottom: 17%;

      width: 82%;
      padding: 8px 5px;

      transform: translateX(-50%);

      color: #efe7d9;
      background: rgba(37, 22, 15, 0.88);

      border: 1px solid rgba(232, 207, 174, 0.42);
      border-radius: 3px;

      text-align: center;
      font-size: clamp(12px, 2vw, 18px);
      letter-spacing: 0.04em;

      box-shadow: 0 4px 7px rgba(0, 0, 0, 0.25);
    }

    /* Worktable */

    .worktable {
      position: absolute;
      left: 50%;
      bottom: 7%;
      z-index: 11;

      width: clamp(210px, 42vw, 470px);
      height: clamp(66px, 11vh, 105px);

      transform: translateX(-50%);

      background:
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 45px,
          rgba(56, 27, 13, 0.16) 47px
        ),
        linear-gradient(
          to bottom,
          #a66c3d,
          #774522
        );

      border: 4px solid #4c2a18;
      border-radius: 5px;

      box-shadow:
        0 18px 18px rgba(0, 0, 0, 0.34),
        inset 0 5px 7px rgba(255, 224, 183, 0.11);
    }

    .table-leg {
      position: absolute;
      top: 90%;
      width: 8%;
      height: 95%;

      background: linear-gradient(
        90deg,
        #422416,
        #704121,
        #382015
      );

      border: 2px solid #342016;
    }

    .table-leg-left {
      left: 8%;
    }

    .table-leg-right {
      right: 8%;
    }

    /* Small pieces that can later be replaced with real photographs */

    .coffee {
      position: absolute;
      left: 11%;
      bottom: 78%;

      width: clamp(26px, 5vw, 43px);
      height: clamp(25px, 4.7vw, 40px);

      background: #dfd3bd;
      border: 3px solid #4a2d1e;
      border-radius: 3px 3px 10px 10px;

      transform: rotate(-4deg);
    }

    .coffee::after {
      content: "";
      position: absolute;
      right: -13px;
      top: 6px;

      width: 13px;
      height: 16px;

      border: 4px solid #4a2d1e;
      border-left: 0;
      border-radius: 0 10px 10px 0;
    }

    .paper {
      position: absolute;
      left: 34%;
      bottom: 83%;

      width: 29%;
      height: 32%;

      background: #e9dfcb;
      border: 1px solid #79634e;

      transform: rotate(4deg);

      box-shadow: 0 3px 5px rgba(0, 0, 0, 0.23);
    }

    .paper::before,
    .paper::after {
      content: "";
      position: absolute;
      left: 12%;
      right: 12%;

      height: 2px;
      background: rgba(67, 62, 55, 0.4);
    }

    .paper::before {
      top: 35%;
    }

    .paper::after {
      top: 59%;
    }

    .paint-spill {
      position: absolute;
      right: 20%;
      bottom: 81%;

      width: clamp(35px, 6vw, 60px);
      height: clamp(18px, 3vw, 30px);

      background: #2d5561;
      border-radius: 48% 52% 42% 58%;

      transform: rotate(9deg);

      opacity: 0.85;
    }

    .paint-spill::before {
      content: "";
      position: absolute;
      right: -14%;
      bottom: -10%;

      width: 28%;
      aspect-ratio: 1;

      background: inherit;
      border-radius: 50%;
    }

    /* Simple guitar silhouette */

    .guitar {
      position: absolute;
      top: 20%;
      left: 50%;
      z-index: 6;

      width: 28px;
      height: 190px;

      transform: translateX(-50%) rotate(4deg);

      background: linear-gradient(
        90deg,
        #3b2418,
        #93603a,
        #3b2418
      );

      border-radius: 9px 9px 4px 4px;

      box-shadow: 4px 7px 8px rgba(0, 0, 0, 0.25);
    }

    .guitar::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -34px;

      width: 76px;
      height: 88px;

      transform: translateX(-50%);

      background:
        radial-gradient(
          circle at 50% 46%,
          #17110e 0 9px,
          transparent 10px
        ),
        linear-gradient(
          90deg,
          #4f2d1b,
          #a66a3c 50%,
          #4f2d1b
        );

      border: 3px solid #382116;
      border-radius: 48% 48% 43% 43%;
    }

    /* Navigation arrows */

    .rotate-button {
      position: absolute;
      top: 50%;
      z-index: 20;

      width: clamp(48px, 8vw, 72px);
      height: clamp(70px, 14vh, 112px);

      transform: translateY(-50%);

      color: #f5eee3;
      background: rgba(34, 22, 16, 0.76);

      border: 2px solid rgba(241, 218, 187, 0.5);
      border-radius: 7px;

      cursor: pointer;

      font-size: clamp(28px, 7vw, 52px);
      line-height: 1;

      backdrop-filter: blur(5px);

      transition:
        background 180ms ease,
        transform 180ms ease;
    }

    .rotate-button:hover,
    .rotate-button:focus-visible {
      background: rgba(67, 39, 24, 0.94);
    }

    .rotate-button:active {
      transform: translateY(-50%) scale(0.94);
    }

    .rotate-left {
      left: max(8px, env(safe-area-inset-left));
    }

    .rotate-right {
      right: max(8px, env(safe-area-inset-right));
    }

    /* Current view label */

    .view-label {
      position: absolute;
      top: calc(8% + env(safe-area-inset-top));
      left: 50%;
      z-index: 20;

      transform: translateX(-50%);

      padding: 7px 13px;

      color: rgba(255, 246, 231, 0.88);
      background: rgba(43, 25, 17, 0.68);

      border: 1px solid rgba(240, 215, 181, 0.36);
      border-radius: 999px;

      font-size: clamp(11px, 2.5vw, 15px);
      letter-spacing: 0.07em;
      text-align: center;

      backdrop-filter: blur(4px);
    }

    /* Back to front door */

    .back-home {
      position: absolute;
      left: 50%;
      bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 25;

      transform: translateX(-50%);

      padding: 8px 15px;

      color: rgba(245, 237, 225, 0.88);
      background: rgba(35, 22, 16, 0.72);

      border: 1px solid rgba(239, 215, 182, 0.37);
      border-radius: 4px;

      text-decoration: none;
      font-size: 13px;

      backdrop-filter: blur(5px);
    }

    .back-home:hover,
    .back-home:focus-visible {
      background: rgba(72, 43, 27, 0.9);
    }

    /* Phone layout */

    @media (max-width: 720px) {
      .view-stage {
        inset: 9% 0 29% 0;
      }

      .room-view {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 1fr);

        align-items: end;

        gap: 12px 16px;
        padding:
          78px
          52px
          12px;
      }

      .door {
        height: clamp(135px, 23vh, 205px);
        max-width: 118px;
      }

      .window {
        top: 11%;
        opacity: 0.9;
      }

      .window-left {
        left: 5%;
      }

      .window-right {
        right: 5%;
      }

      .guitar {
        top: 16%;
        height: 125px;
        width: 18px;
      }

      .guitar::before {
        width: 50px;
        height: 59px;
        bottom: -24px;
      }

      .worktable {
        bottom: 8%;
      }

      .column {
        bottom: 27%;
      }

      .floor {
        bottom: -22%;
        height: 62%;
      }
    }

    @media (max-height: 600px) and (orientation: landscape) {
      .room-view {
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: 1fr;

        padding:
          25px
          80px
          8px;
      }

      .door {
        height: 55vh;
      }

      .window {
        display: none;
      }

      .worktable {
        width: 32vw;
        bottom: 4%;
      }

      .view-label {
        top: 4%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .room-view,
      .trees,
      .door,
      .rotate-button {
        animation: none;
        transition: none;
      }
    }
  </style>
</head>

<body>
  <main class="house" id="house">

    <div class="cedar-wall"></div>
    <div class="top-beam"></div>

    <div class="column column-left"></div>
    <div class="column column-right"></div>

    <div class="window window-left" aria-hidden="true">
      <div class="trees"></div>
    </div>

    <div class="window window-right" aria-hidden="true">
      <div class="trees"></div>
    </div>

    <div class="guitar" aria-hidden="true"></div>

    <div class="floor"></div>

    <div
      class="view-label"
      id="viewLabel"
      aria-live="polite"
    >
      Wall one of two
    </div>

    <section
      class="view-stage"
      aria-label="Studio LaDuke rooms"
    >

      <!-- FIRST HALF OF THE ROOM -->

      <div
        class="room-view active"
        id="viewOne"
        aria-hidden="false"
      >

        <a class="door" href="#" data-room="Artwork">
          <span class="door-sign">Artwork</span>
        </a>

        <a class="door" href="#" data-room="Music">
          <span class="door-sign">Music</span>
        </a>

        <a class="door" href="#" data-room="Books">
          <span class="door-sign">Books</span>
        </a>

        <a class="door" href="#" data-room="Workshop">
          <span class="door-sign">Workshop</span>
        </a>

      </div>

      <!-- SECOND HALF OF THE ROOM -->

      <div
        class="room-view waiting-right"
        id="viewTwo"
        aria-hidden="true"
      >

        <a class="door" href="#" data-room="Arcade">
          <span class="door-sign">Arcade</span>
        </a>

        <a class="door" href="#" data-room="Projects">
          <span class="door-sign">Projects</span>
        </a>

        <a class="door" href="bob.html" data-room="Bob">
          <span class="door-sign">Bob</span>
        </a>

        <a class="door" href="#" data-room="Coming Soon">
          <span class="door-sign">Coming Soon</span>
        </a>

      </div>

    </section>

    <div class="worktable" aria-hidden="true">
      <div class="coffee"></div>
      <div class="paper"></div>
      <div class="paint-spill"></div>

      <div class="table-leg table-leg-left"></div>
      <div class="table-leg table-leg-right"></div>
    </div>

    <button
      class="rotate-button rotate-left"
      id="rotateLeft"
      type="button"
      aria-label="Turn left"
    >
      ‹
    </button>

    <button
      class="rotate-button rotate-right"
      id="rotateRight"
      type="button"
      aria-label="Turn right"
    >
      ›
    </button>

    <a class="back-home" href="index.html">
      Back to the front door
    </a>

    <div class="room-light"></div>

  </main>

  <script>
    const viewOne = document.getElementById("viewOne");
    const viewTwo = document.getElementById("viewTwo");

    const rotateLeft = document.getElementById("rotateLeft");
    const rotateRight = document.getElementById("rotateRight");

    const viewLabel = document.getElementById("viewLabel");
    const house = document.getElementById("house");

    let currentView = 1;
    let touchStartX = 0;
    let touchEndX = 0;

    function showView(nextView, direction) {
      if (nextView === currentView) {
        return;
      }

      if (nextView === 2) {
        viewOne.className =
          direction === "right"
            ? "room-view waiting-left"
            : "room-view waiting-right";

        viewTwo.className = "room-view active";

        viewOne.setAttribute("aria-hidden", "true");
        viewTwo.setAttribute("aria-hidden", "false");

        viewLabel.textContent = "Wall two of two";
      } else {
        viewTwo.className =
          direction === "left"
            ? "room-view waiting-right"
            : "room-view waiting-left";

        viewOne.className = "room-view active";

        viewTwo.setAttribute("aria-hidden", "true");
        viewOne.setAttribute("aria-hidden", "false");

        viewLabel.textContent = "Wall one of two";
      }

      currentView = nextView;
    }

    function turnRight() {
      const nextView = currentView === 1 ? 2 : 1;
      showView(nextView, "right");
    }

    function turnLeft() {
      const nextView = currentView === 1 ? 2 : 1;
      showView(nextView, "left");
    }

    rotateRight.addEventListener("click", turnRight);
    rotateLeft.addEventListener("click", turnLeft);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") {
        turnRight();
      }

      if (event.key === "ArrowLeft") {
        turnLeft();
      }
    });

    house.addEventListener(
      "touchstart",
      (event) => {
        touchStartX = event.changedTouches[0].screenX;
      },
      { passive: true }
    );

    house.addEventListener(
      "touchend",
      (event) => {
        touchEndX = event.changedTouches[0].screenX;

        const swipeDistance = touchEndX - touchStartX;

        if (Math.abs(swipeDistance) < 55) {
          return;
        }

        if (swipeDistance < 0) {
          turnRight();
        } else {
          turnLeft();
        }
      },
      { passive: true }
    );

    /*
      Prevent unfinished placeholder doors from jumping
      to the top of the page.

      Later, replace href="#" with the real page name,
      such as href="art.html".
    */

    document.querySelectorAll('.door[href="#"]').forEach((door) => {
      door.addEventListener("click", (event) => {
        event.preventDefault();

        const roomName = door.dataset.room || "This room";

        viewLabel.textContent =
          roomName + " is not open yet.";

        window.setTimeout(() => {
          viewLabel.textContent =
            currentView === 1
              ? "Wall one of two"
              : "Wall two of two";
        }, 1600);
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Bob</title>
  
  <style>
.pupils {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 18%;
  height: 6%;
  transform: translateX(-50%);
  z-index: 5;
  pointer-events: none;
}

.pupil {
  position: absolute;
  top: 49%;
  width: 10%;
  aspect-ratio: 1;
  background: #111;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.pupil-left {
  left: 38%;
}

.pupil-right {
  left: 78%;
}
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050504;
    }

    body {
      display: grid;
      place-items: center;
    }

    /*
      The whole scene always keeps the same 3:2 shape as the artwork.
      On a tall phone, black space appears above and below instead of
      zooming into Bob's face.
    */

    .scene {
      position: relative;
      width: min(100vw, 150vh);
      aspect-ratio: 3 / 2;
      overflow: hidden;
      background: #050504;
    }

    .room-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    /*
      Subtle ceiling-light flicker.
    */

    .flicker-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: rgba(0, 0, 0, 0);
      transition: background 70ms linear;
      z-index: 4;
    }

    .flicker-layer.dim {
      background: rgba(0, 0, 0, 0.12);
    }

    /*
      A cleaner hand-drawn-looking boombox.
    */

    .boombox {
      position: absolute;
      left: 7%;
      bottom: 7%;
      width: 18%;
      aspect-ratio: 1.85 / 1;
      z-index: 6;

      border: clamp(2px, 0.22vw, 4px) solid #161613;
      border-radius: 4px;

      background:
        repeating-linear-gradient(
          -8deg,
          rgba(255,255,255,0.035) 0 1px,
          transparent 1px 7px
        ),
        #5b5a52;

      box-shadow: 0 8px 14px rgba(0,0,0,0.4);
      transform: rotate(-1.5deg);
    }

    .handle {
      position: absolute;
      left: 23%;
      right: 23%;
      top: -20%;
      height: 24%;

      border: clamp(2px, 0.22vw, 4px) solid #161613;
      border-bottom: 0;
      border-radius: 5px 5px 0 0;
    }

    .speaker {
      position: absolute;
      top: 27%;
      width: 31%;
      aspect-ratio: 1;
      border-radius: 50%;

      border: clamp(2px, 0.2vw, 4px) solid #161613;

      background:
        repeating-radial-gradient(
          circle,
          #181816 0 1px,
          #4b4a43 2px 4px
        );
    }

    .speaker.left {
      left: 5%;
    }

    .speaker.right {
      right: 5%;
    }

    .display {
      position: absolute;
      left: 40%;
      top: 17%;
      width: 20%;
      height: 17%;

      border: clamp(1px, 0.14vw, 3px) solid #161613;
      background: #11150f;
    }

    .display-light {
      position: absolute;
      left: 48.6%;
      top: 22%;
      width: 2.8%;
      aspect-ratio: 1;
      border-radius: 50%;

      background: #303729;
      opacity: 0.15;
      z-index: 8;
    }

    .display-light.on {
      background: #a7b25e;
      opacity: 0.95;

      box-shadow:
        0 0 5px rgba(180,194,96,0.9),
        0 0 12px rgba(180,194,96,0.45);
    }

    .display-light.blink {
      opacity: 0.18;
    }

    .cassette {
      position: absolute;
      left: 40%;
      top: 42%;
      width: 20%;
      height: 31%;

      border: clamp(1px, 0.14vw, 3px) solid #161613;
      background: #282821;
    }

    .cassette::before,
    .cassette::after {
      content: "";
      position: absolute;
      top: 36%;
      width: 23%;
      aspect-ratio: 1;
      border-radius: 50%;

      border: 1px solid #161613;
      background: #55534b;
    }

    .cassette::before {
      left: 13%;
    }

    .cassette::after {
      right: 13%;
    }

   .play-button {
    position: absolute;
    left: 24.5%;
    top: 65.8%;
    width: 6%;
    height: 4%;
    opacity: .35;   /* temporary so we can see it */
    background: red;
    border: 2px solid yellow;
    z-index: 20;
}

      border: clamp(1px, 0.15vw, 3px) solid #161613;
      border-radius: 3px;
      background: #7a786f;

      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
    }

    .play-button::before {
      content: "";
      position: absolute;
      left: 38%;
      top: 27%;

      border-left: clamp(6px, 0.65vw, 12px) solid #171714;
      border-top: clamp(4px, 0.42vw, 8px) solid transparent;
      border-bottom: clamp(4px, 0.42vw, 8px) solid transparent;
    }

    .play-button.playing {
      transform: translateY(2px);
      background: #4b4a44;
    }

    /*
      Visible enough to leave, but still quiet.
    */

    .return-button {
      position: absolute;
      right: 2.5%;
      bottom: 3%;
      z-index: 10;

      width: 34px;
      height: 34px;

      display: grid;
      place-items: center;

      color: rgba(235, 228, 207, 0.35);
      text-decoration: none;
      font-family: Georgia, serif;
      font-size: 22px;

      border: 1px solid rgba(235, 228, 207, 0.12);
      border-radius: 50%;
      background: rgba(0,0,0,0.12);
    }

    .return-button:active {
      color: rgba(235, 228, 207, 0.8);
    }

    @media (prefers-reduced-motion: reduce) {
      .flicker-layer {
        transition: none;
      }
    }
  @keyframes bobEyes {
 
}

.pupil {
  animation: bobEyes 7s ease-in-out infinite;
}
@keyframes bobLookAround {
  0%, 15%, 100% {
    transform: translateX(-50%) translate(0px, -2px);
  }

  25%, 35% {
    transform: translateX(-50%) translate(-5px, -2px);
  }

  45%, 55% {
    transform: translateX(-50%) translate(5px, -2px);
  }

  65%, 75% {
    transform: translateX(-50%) translate(0px, -5px);
  }

  85%, 92% {
    transform: translateX(-50%) translate(3px, -4px);
  }
}
.pupils {
  animation: bobLookAround 9s ease-in-out infinite;
}


  </style>
</head>

<body>
  <main class="scene">

  <img
  class="room-image"
  src="E956061E-F579-4116-BB39-58CB7C272AD3.png"
  alt="Bob sits silently beneath a hanging light in a dark room."
>

<div class="pupils" aria-hidden="true">
  <span class="pupil pupil-left"></span>
  <span class="pupil pupil-right"></span>
</div>

<div
  id="flickerLayer"
  class="flicker-layer"
  aria-hidden="true"
></div>

  </main>

  <script>
    const playButton =
      document.getElementById("playButton");

    const displayLight =
      document.getElementById("displayLight");

    const flickerLayer =
      document.getElementById("flickerLayer");

    let playing = false;

    let audioContext = null;
    let masterGain = null;

    let musicTimer = null;
    let bulbTimer = null;
    let displayTimer = null;

    let noteIndex = 0;

    const notes = [
      110.00,
      146.83,
      130.81,
      98.00,
      110.00,
      155.56,
      146.83,
      103.83
    ];

    function createTone(
      frequency,
      duration,
      volume,
      waveType = "sine"
    ) {
      if (!audioContext || !masterGain) {
        return;
      }

      const now = audioContext.currentTime;

      const oscillator =
        audioContext.createOscillator();

      const gain =
        audioContext.createGain();

      const filter =
        audioContext.createBiquadFilter();

      oscillator.type = waveType;
      oscillator.frequency.value = frequency;

      filter.type = "lowpass";
      filter.frequency.value = 620;

      gain.gain.setValueAtTime(
        0.0001,
        now
      );

      gain.gain.exponentialRampToValueAtTime(
        volume,
        now + 0.05
      );

      gain.gain.exponentialRampToValueAtTime(
        0.0001,
        now + duration
      );

      oscillator.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);

      oscillator.start(now);
      oscillator.stop(now + duration + 0.1);
    }

    function playMusicStep() {
      if (!playing || !audioContext) {
        return;
      }

      createTone(
        notes[noteIndex % notes.length],
        1.35,
        0.28,
        noteIndex % 3 === 0
          ? "triangle"
          : "sine"
      );

      if (noteIndex % 4 === 0) {
        createTone(
          55,
          1.7,
          0.14,
          "sine"
        );
      }

      noteIndex += 1;
    }

    function startMusic() {
      audioContext = new (
        window.AudioContext ||
        window.webkitAudioContext
      )();

      masterGain =
        audioContext.createGain();

      masterGain.gain.value = 0.08;
      masterGain.connect(audioContext.destination);

      playMusicStep();

      musicTimer = window.setInterval(
        playMusicStep,
        1650
      );
    }

    function stopMusic() {
      window.clearInterval(musicTimer);
      musicTimer = null;

      if (audioContext) {
        audioContext.close();
        audioContext = null;
        masterGain = null;
      }
    }

    function scheduleBulbFlicker() {
      window.clearTimeout(bulbTimer);

      if (!playing) {
        return;
      }

      bulbTimer = window.setTimeout(() => {
        flickerLayer.classList.add("dim");

        window.setTimeout(() => {
          flickerLayer.classList.remove("dim");
        }, 60 + Math.random() * 100);

        scheduleBulbFlicker();

      }, 3500 + Math.random() * 8500);
    }

    function scheduleDisplayFlicker() {
      window.clearTimeout(displayTimer);

      if (!playing) {
        return;
      }

      displayTimer = window.setTimeout(() => {
        displayLight.classList.add("blink");

        window.setTimeout(() => {
          displayLight.classList.remove("blink");
        }, 70 + Math.random() * 130);

        scheduleDisplayFlicker();

      }, 1600 + Math.random() * 4800);
    }

    function startRoom() {
      playing = true;

      playButton.classList.add("playing");
      displayLight.classList.add("on");

      startMusic();
      scheduleBulbFlicker();
      scheduleDisplayFlicker();
    }

    function stopRoom() {
      playing = false;

      playButton.classList.remove("playing");

      displayLight.classList.remove(
        "on",
        "blink"
      );

      flickerLayer.classList.remove("dim");

      window.clearTimeout(bulbTimer);
      window.clearTimeout(displayTimer);

      stopMusic();
    }

    playButton.addEventListener("click", () => {
      if (playing) {
        stopRoom();
      } else {
        startRoom();
      }
    });
  </script>
</body>
</html>

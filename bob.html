<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Bob</title>
  
  <style>
.pupils {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 18%;
  height: 6%;
  transform: translateX(-50%);
  z-index: 5;
  pointer-events: none;
}

.pupil {
  position: absolute;
  top: 49%;
  width: 10%;
  aspect-ratio: 1;
  background: #111;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.pupil-left {
  left: 38%;
}

.pupil-right {
  left: 78%;
}
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050504;
    }

    body {
      display: grid;
      place-items: center;
    }

    /*
      The whole scene always keeps the same 3:2 shape as the artwork.
      On a tall phone, black space appears above and below instead of
      zooming into Bob's face.
    */

    .scene {
      position: relative;
      width: min(100vw, 150vh);
      aspect-ratio: 3 / 2;
      overflow: hidden;
      background: #050504;
    }

    .room-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    /*
      Subtle ceiling-light flicker.
    */

    .flicker-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: rgba(0, 0, 0, 0);
      transition: background 70ms linear;
      z-index: 15;
    }

    .flicker-layer.dim {
      background: rgba(0, 0, 0, 0.12);
    }

    

  .display-light {
  position: absolute;
  left: 15.8%;
  top: 61.5%;
  width: 2%;
  aspect-ratio: 1;
  border-radius: 50%;

  background: #303729;
  opacity: .15;
  z-index: 25;
}

    .display-light.on {
      background: #a7b25e;
      opacity: 0.95;

      box-shadow:
        0 0 5px rgba(180,194,96,0.9),
        0 0 12px rgba(180,194,96,0.45);
    }

    .display-light.blink {
      opacity: 0.18;
    }



.play-button {
  position: absolute;
  left: 10.8%;
  top: 57.3%;
  width: 24%;
  height: 23%;

  background: transparent;
  border: none;

  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  z-index: 20;
}
.play-button::before{
    display:none;
}

.play-button.playing {
  background: transparent;
}

    /*
      Visible enough to leave, but still quiet.
    */

    .return-button {
      position: absolute;
      right: 2.5%;
      bottom: 3%;
      z-index: 10;

      width: 34px;
      height: 34px;

      display: grid;
      place-items: center;

      color: rgba(235, 228, 207, 0.35);
      text-decoration: none;
      font-family: Georgia, serif;
      font-size: 22px;

      border: 1px solid rgba(235, 228, 207, 0.12);
      border-radius: 50%;
      background: rgba(0,0,0,0.12);
    }

    .return-button:active {
      color: rgba(235, 228, 207, 0.8);
    }

    @media (prefers-reduced-motion: reduce) {
      .flicker-layer {
        transition: none;
      }
    }
  @keyframes bobEyes {
 
}

.pupil {
  animation: bobEyes 7s ease-in-out infinite;
}
@keyframes bobLookAround {
  0%, 15%, 100% {
    transform: translateX(-50%) translate(0px, -2px);
  }

  25%, 35% {
    transform: translateX(-50%) translate(-5px, -2px);
  }

  45%, 55% {
    transform: translateX(-50%) translate(5px, -2px);
  }

  65%, 75% {
    transform: translateX(-50%) translate(0px, -5px);
  }

  85%, 92% {
    transform: translateX(-50%) translate(3px, -4px);
  }
}
.pupils {
  animation: bobLookAround 9s ease-in-out infinite;
}


  </style>
</head>

<body>
  <main class="scene">

  <img
  class="room-image"
  src="E956061E-F579-4116-BB39-58CB7C272AD3.png"
  alt="Bob sits silently beneath a hanging light in a dark room."
>

<div class="pupils" aria-hidden="true">
  <span class="pupil pupil-left"></span>
  <span class="pupil pupil-right"></span>
</div>

<button
  id="playButton"
  class="play-button"
  type="button"
  aria-label="Play or stop Bob's radio"
></button>

<div
  id="displayLight"
  class="display-light"
  aria-hidden="true"
></div>

<div
  id="flickerLayer"
  class="flicker-layer"
  aria-hidden="true"
></div>

  </main>

  <script>
    const playButton =
      document.getElementById("playButton");

    const displayLight =
      document.getElementById("displayLight");

    const flickerLayer =
      document.getElementById("flickerLayer");

    let playing = false;

    let audioContext = null;
    let masterGain = null;

    let musicTimer = null;
    let bulbTimer = null;
    let displayTimer = null;

    let noteIndex = 0;

    const notes = [
      110.00,
      146.83,
      130.81,
      98.00,
      110.00,
      155.56,
      146.83,
      103.83
    ];

    function createTone(
      frequency,
      duration,
      volume,
      waveType = "sine"
    ) {
      if (!audioContext || !masterGain) {
        return;
      }

      const now = audioContext.currentTime;

      const oscillator =
        audioContext.createOscillator();

      const gain =
        audioContext.createGain();

      const filter =
        audioContext.createBiquadFilter();

      oscillator.type = waveType;
      oscillator.frequency.value = frequency;

      filter.type = "lowpass";
      filter.frequency.value = 620;

      gain.gain.setValueAtTime(
        0.0001,
        now
      );

      gain.gain.exponentialRampToValueAtTime(
        volume,
        now + 0.05
      );

      gain.gain.exponentialRampToValueAtTime(
        0.0001,
        now + duration
      );

      oscillator.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);

      oscillator.start(now);
      oscillator.stop(now + duration + 0.1);
    }

    function playMusicStep() {
      if (!playing || !audioContext) {
        return;
      }

      createTone(
        notes[noteIndex % notes.length],
        1.35,
        0.28,
        noteIndex % 3 === 0
          ? "triangle"
          : "sine"
      );

      if (noteIndex % 4 === 0) {
        createTone(
          55,
          1.7,
          0.14,
          "sine"
        );
      }

      noteIndex += 1;
    }

    function startMusic() {
      audioContext = new (
        window.AudioContext ||
        window.webkitAudioContext
      )();

      masterGain =
        audioContext.createGain();

      masterGain.gain.value = 0.08;
      masterGain.connect(audioContext.destination);

      playMusicStep();

      musicTimer = window.setInterval(
        playMusicStep,
        1650
      );
    }

    function stopMusic() {
      window.clearInterval(musicTimer);
      musicTimer = null;

      if (audioContext) {
        audioContext.close();
        audioContext = null;
        masterGain = null;
      }
    }

    function scheduleBulbFlicker() {
      window.clearTimeout(bulbTimer);

      if (!playing) {
        return;
      }

      bulbTimer = window.setTimeout(() => {
        flickerLayer.classList.add("dim");

        window.setTimeout(() => {
          flickerLayer.classList.remove("dim");
        }, 60 + Math.random() * 100);

        scheduleBulbFlicker();

      }, 3500 + Math.random() * 8500);
    }

    function scheduleDisplayFlicker() {
      window.clearTimeout(displayTimer);

      if (!playing) {
        return;
      }

      displayTimer = window.setTimeout(() => {
        displayLight.classList.add("blink");

        window.setTimeout(() => {
          displayLight.classList.remove("blink");
        }, 70 + Math.random() * 130);

        scheduleDisplayFlicker();

      }, 1600 + Math.random() * 4800);
    }

    function startRoom() {
      playing = true;

      playButton.classList.add("playing");
      displayLight.classList.add("on");

      startMusic();
      scheduleBulbFlicker();
      scheduleDisplayFlicker();
    }

    function stopRoom() {
      playing = false;

      playButton.classList.remove("playing");

      displayLight.classList.remove(
        "on",
        "blink"
      );

      flickerLayer.classList.remove("dim");

      window.clearTimeout(bulbTimer);
      window.clearTimeout(displayTimer);

      stopMusic();
    }

    playButton.addEventListener("click", () => {
      if (playing) {
        stopRoom();
      } else {
        startRoom();
      }
    });
  </script>
</body>
</html>
